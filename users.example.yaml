# Web UI accounts. Copy to users.yaml - or better, let manage_users.py create it:
#
#   python manage_users.py add you@example.com --role admin
#   python manage_users.py add colleague@example.com
#
# users.yaml is gitignored.
#
# There are no passwords. Signing in emails a one-time code to the address, so
# each address here must be a real inbox the person can read.
#
# role: admin  -> sees every monitor, plus Settings, Logs and scheduler controls
# role: user   -> sees only monitors whose `owner` matches their email
#
# A monitor with no `owner` in monitors.yaml is visible to admins only.

users:
  - email: you@example.com
    role: admin

  - email: colleague@example.com
    role: user
