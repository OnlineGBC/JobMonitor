{% extends "base.html" %}

{% block title %}Sign in — JobMonitor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card mt-4">
            <div class="card-body">
                <h4 class="card-title mb-1">
                    <i class="bi bi-box-arrow-in-right"></i> Sign in
                </h4>
                <p class="text-muted small">
                    Enter your email and we'll send you a sign-in code. There is no
                    password to remember.
                </p>
                <hr>

                <form method="POST" action="{{ url_for('login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="next" value="{{ next or '' }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold" for="email">Email</label>
                        <input type="email" class="form-control" id="email" name="email"
                               value="{{ email or '' }}" required autofocus autocomplete="email">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-envelope"></i> Email me a code
                    </button>
                </form>

                <hr>
                <p class="text-muted small mb-0">
                    Accounts are created from the command line. Ask an administrator
                    if you need one.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
